# Configuração Nginx Completa para mytube.social
# Aplicar no VPS: sudo nano /etc/nginx/sites-available/mytube.social

# ============================================
# 1. REDIRECT HTTP → HTTPS (ambos os domínios)
# ============================================
server {
    listen 80;
    listen [::]:80;
    server_name mytube.social www.mytube.social;

    # Redirecionar todo tráfego HTTP para HTTPS
    return 301 https://$host$request_uri;
}

# ============================================
# 2. REDIRECT WWW → SEM WWW (apenas HTTPS)
# ============================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.mytube.social;

    # Certificados SSL - AJUSTAR COM OS CAMINHOS CORRETOS DO SEU VPS
    # Copiar os mesmos caminhos que estão na configuração atual
    ssl_certificate /path/to/your/certificate.crt;
    ssl_certificate_key /path/to/your/certificate.key;
    # Se tiver outros parâmetros SSL na config atual, copiar aqui também

    # Redirect permanente www → sem www
    return 301 https://mytube.social$request_uri;
}

# ============================================
# 3. SITE PRINCIPAL (HTTPS sem www)
# ============================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mytube.social;

    # Certificados SSL - COPIAR DA CONFIGURAÇÃO ATUAL
    # Ver com: sudo cat /etc/nginx/sites-available/mytube.social | grep ssl
    ssl_certificate /path/to/your/certificate.crt;
    ssl_certificate_key /path/to/your/certificate.key;
    # Adicionar outros parâmetros SSL da configuração atual aqui

    # Root e index
    root /var/www/mytube.social;
    index index.php index.html;

    # Logs
    access_log /var/log/nginx/mytube.social.access.log;
    error_log /var/log/nginx/mytube.social.error.log;

    # Upload de arquivos grandes (vídeos)
    client_max_body_size 150M;
    client_body_timeout 300s;

    # Location para arquivos PHP
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_read_timeout 300;
    }

    # Tentar servir arquivo, se não existir, tentar diretório, se não, 404
    location / {
        try_files $uri $uri/ =404;
    }

    # Negar acesso a arquivos .htaccess
    location ~ /\.ht {
        deny all;
    }

    # Negar acesso a arquivos sensíveis
    location ~ /\.(env|git) {
        deny all;
    }

    # Cache para assets estáticos
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
