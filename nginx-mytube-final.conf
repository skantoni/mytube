# ===== BLOCO 1: Redirecionar HTTP → HTTPS =====
server {
    listen 80;
    listen [::]:80;
    server_name mytube.social www.mytube.social;

    # Redirecionar todo tráfego HTTP para HTTPS
    return 301 https://$host$request_uri;
}

# ===== BLOCO 2: Redirecionar WWW → SEM WWW (HTTPS) =====
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.mytube.social;

    # Certificados SSL da Cloudflare Origin
    ssl_certificate /etc/ssl/cloudflare/cert.pem;
    ssl_certificate_key /etc/ssl/cloudflare/key.pem;

    # Configurações SSL otimizadas
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';

    # Redirect permanente www → sem www
    return 301 https://mytube.social$request_uri;
}

# ===== BLOCO 3: Servidor HTTPS Principal (SEM WWW) =====
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mytube.social;

    root /var/www/mytube.social;
    index index.php index.html index.htm;

    # ===== Certificados SSL da Cloudflare Origin =====
    ssl_certificate /etc/ssl/cloudflare/cert.pem;
    ssl_certificate_key /etc/ssl/cloudflare/key.pem;

    # Configurações SSL otimizadas
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';

    # ===== Logs =====
    access_log /var/log/nginx/mytube_access.log;
    error_log /var/log/nginx/mytube_error.log;

    # ===== Headers de Segurança =====
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ===== Timeouts para uploads grandes =====
    client_max_body_size 100M;
    client_body_timeout 300s;
    fastcgi_read_timeout 300s;

    # ===== Proteger ficheiros sensíveis =====
    location ~ /\. {
        deny all;
        return 404;
    }

    location ~* \.env$ {
        deny all;
        return 404;
    }

    location ^~ /logs/ {
        deny all;
        return 404;
    }

    location ^~ /database/ {
        deny all;
        return 404;
    }

    location ^~ /includes/ {
        deny all;
        return 404;
    }

    location ~ \.git {
        deny all;
        return 404;
    }

    # ===== Bloquear arquivos de teste e debug =====
    location ~ ^/(check_|test_|debug_|install_|migrate_|update_) {
        deny all;
        return 404;
    }

    # ===== URLs amigáveis =====
    location /user/ {
        rewrite ^/user/([^/]+)$ /profile.php?user=$1 last;
    }

    location /video/ {
        rewrite ^/video/([0-9]+)$ /watch.php?id=$1 last;
    }

    location /tag/ {
        rewrite ^/tag/([^/]+)$ /explore.php?tag=$1 last;
    }

    # ===== WebSocket do Chat (Socket.io) =====
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # ===== Cache de imagens =====
    location ~* \.(jpg|jpeg|png|gif|webp|svg|ico|avif|heic|heif|bmp|tiff|tif)$ {
        expires 1M;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ===== Cache de vídeos =====
    location ~* \.(mp4|webm|mov|avi|mkv|3gp)$ {
        expires 1w;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ===== Cache de áudio =====
    location ~* \.(mp3|wav|ogg|m4a|aac|flac)$ {
        expires 1w;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ===== Cache de CSS/JS =====
    location ~* \.(css|js|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ===== PHP-FPM =====
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_read_timeout 300;
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;

        # Headers para detectar HTTPS atrás do Cloudflare
        fastcgi_param HTTPS on;
        fastcgi_param HTTP_X_FORWARDED_PROTO https;
    }

    # ===== Rota principal (deve ficar por último) =====
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }
}
